<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlace Fatal - Red en el Horizonte</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1E1E1E;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- PANTALLA DE CARGA AVANZADA (10 SEGUNDOS) --- */
        #pantalla-carga {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #121212;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #canvas-animacion-carga {
            width: 500px;
            height: 350px;
            background: transparent;
        }

        .texto-carga {
            color: #FFFFFF;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 10px;
            animation: pulsarTexto 1.5s infinite ease-in-out;
        }

        @keyframes pulsarTexto {
            0%, 100% { opacity: 0.4; color: #ffffff; }
            50% { opacity: 1; color: #00FF00; text-shadow: 0 0 10px rgba(0,255,0,0.4); }
        }

        .carga-terminada {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* --- INTERFAZ DEL JUEGO --- */
        #ui-instrucciones {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: #FFFFFF;
            background: rgba(30, 30, 30, 0.75);
            padding: 15px 25px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #ui-instrucciones h1 {
            margin: 0 0 5px 0;
            font-size: 20px;
            letter-spacing: 1px;
            color: #00FF00;
        }

        #ui-instrucciones p {
            margin: 5px 0;
            font-size: 13px;
            color: #CCCCCC;
        }

        #status-islas {
            font-weight: bold;
            color: #FFF !important;
            margin-top: 10px !important;
        }

        #pantalla-victoria {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 5, 0.15); 
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        #pantalla-victoria.activa {
            opacity: 1;
            pointer-events: auto;
        }

        #pantalla-victoria h2 {
            color: #00FF00;
            font-size: 64px; 
            margin-bottom: 20px;
            text-shadow: 0 0 25px rgba(0, 255, 0, 0.8);
            letter-spacing: 6px;
        }

        .btn-reiniciar {
            background: #2B2BFF;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(43, 43, 255, 0.4);
            transition: transform 0.2s, background 0.2s;
        }

        .btn-reiniciar:hover {
            background: #1A1AFF;
            transform: scale(1.05);
        }

        .btn-reiniciar:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="pantalla-carga">
        <canvas id="canvas-animacion-carga" width="500" height="350"></canvas>
        <div class="texto-carga">Creando enlaces...</div>
    </div>

    <div id="ui-instrucciones">
        <h1>ENLACE FATAL</h1>
        <p>• Click Izquierdo en hexágonos vacíos para ramificar.</p>
        <p>• Arrastra con Click Izquierdo para mover la cámara.</p>
        <p>• Usa la rueda del mouse para hacer zoom.</p>
        <p id="status-islas">Estructuras pendientes: Cargando...</p>
    </div>

    <div id="pantalla-victoria">
        <h2>¡VICTORIA!</h2>
        <button class="btn-reiniciar" onclick="reiniciarJuegoTotal()">Reiniciar Red</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- LOGICA DE LA ANIMACION DE CARGA (9 HEXÁGONOS SIMULADOS) ---
        (function iniciarAnimacionCarga() {
            const canvas = document.getElementById('canvas-animacion-carga');
            const ctx = canvas.getContext('2d');
            
            const colores = ['#FF2400', '#00FF00', '#2B2BFF', '#B04FFF'];
            const tamHex = 28;
            const centroX = canvas.width / 2;
            const centroY = canvas.height / 2;

            let nodosCarga = [
                { x: centroX, y: centroY, activo: true, color: 'rgba(255,255,255,0.2)', esTronco: true }
            ];

            for (let i = 0; i < 8; i++) {
                let angulo = (Math.PI * 2 / 8) * i;
                nodosCarga.push({
                    x: centroX + Math.cos(angulo) * 95,
                    y: centroY + Math.sin(angulo) * 95,
                    activo: false,
                    color: '',
                    pctEnlace: 0 
                });
            }

            let nodoActualConectando = 1;

            function drawHex(x, y, radio, fillCol, strokeCol) {
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    let a = (Math.PI / 3) * i + Math.PI / 2;
                    let hx = x + Math.cos(a) * radio;
                    let hy = y + Math.sin(a) * radio;
                    if (i === 0) ctx.moveTo(hx, hy);
                    else ctx.lineTo(hx, hy);
                }
                ctx.closePath();
                if (fillCol) { ctx.fillStyle = fillCol; ctx.fill(); }
                ctx.strokeStyle = strokeCol;
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            function bucleCarga() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (nodoActualConectando < nodosCarga.length) {
                    let n = nodosCarga[nodoActualConectando];
                    n.pctEnlace += 0.015; 

                    if (n.pctEnlace >= 1) {
                        n.pctEnlace = 1;
                        n.activo = true;
                        n.color = colores[nodoActualConectando % colores.length];
                        nodoActualConectando++; 
                    }
                } else {
                    setTimeout(() => {
                        for(let i=1; i<nodosCarga.length; i++) {
                            nodosCarga[i].activo = false;
                            nodosCarga[i].pctEnlace = 0;
                        }
                        nodoActualConectando = 1;
                    }, 400);
                }

                nodosCarga.forEach((n, idx) => {
                    if (idx > 0 && n.pctEnlace > 0) {
                        ctx.beginPath();
                        ctx.moveTo(centroX, centroY);
                        let actualX = centroX + (n.x - centroX) * n.pctEnlace;
                        let actualY = centroY + (n.y - centroY) * n.pctEnlace;
                        ctx.lineTo(actualX, actualY);
                        ctx.strokeStyle = n.activo ? n.color : 'rgba(255,255,255,0.7)';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                    }
                });

                nodosCarga.forEach(n => {
                    if (n.esTronco) {
                        drawHex(n.x, n.y, tamHex, 'rgba(255,255,255,0.1)', '#FFFFFF');
                        ctx.beginPath();
                        ctx.arc(n.x, n.y, 4, 0, Math.PI*2);
                        ctx.fillStyle = '#FFF';
                        ctx.fill();
                    } else {
                        if (n.activo) {
                            drawHex(n.x, n.y, tamHex, n.color + 'BF', n.color);
                        } else {
                            drawHex(n.x, n.y, tamHex, 'rgba(30,30,30,0.4)', 'rgba(255,255,255,0.25)');
                        }
                    }
                });

                requestAnimationFrame(bucleCarga);
            }
            
            requestAnimationFrame(bucleCarga);

            setTimeout(() => {
                const loader = document.getElementById('pantalla-carga');
                if(loader) loader.classList.add('carga-terminada');
            }, 10000);
        })();


        // --- CÓDIGO DEL JUEGO PRINCIPAL (p5.js) ---
        let reiniciarJuegoTotal; 

        const sketch = (p) => {
            let nodos = [];
            let lineas = [];
            let tamanoHex = 25; 
            let distanciaRamas = 90;
            let islas = [];

            let camaraX = 0, camaraY = 0;
            let destinoCamX = 0, destinoCamY = 0;
            let zoom = 1.0;
            let destinoZoom = 1.0;

            let juegoGanado = false;
            let particulasMatrix = []; 

            const COLORES_FIGMA = {
                rojo: '#FF2400',
                verde: '#00FF00',
                azul: '#2B2BFF',
                morado: '#B04FFF'
            };

            let audioCtx = null;
            function reproducirSonido(frecuencia, tipo = 'sine', duracion = 0.15) {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                osc.type = tipo;
                osc.frequency.setValueAtTime(frecuencia, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01); 
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duracion); 
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duracion + 0.01);
            }

            function sonidoVictoria() {
                reproducirSonido(523.25, 'triangle', 0.1); 
                setTimeout(() => { reproducirSonido(659.25, 'triangle', 0.1); }, 80); 
                setTimeout(() => { reproducirSonido(783.99, 'triangle', 0.3); }, 160); 
            }

            function sonidoVictoriaFinal() {
                setTimeout(() => { reproducirSonido(523.25, 'sine', 0.15); }, 0);
                setTimeout(() => { reproducirSonido(659.25, 'sine', 0.15); }, 100);
                setTimeout(() => { reproducirSonido(783.99, 'sine', 0.15); }, 200);
                setTimeout(() => { reproducirSonido(1046.50, 'sine', 0.4); }, 300);
            }

            function inicializarIslas() {
                islas = [];
                
                // Mezclar de manera aleatoria las direcciones del horizonte (Dos izq, Dos der)
                let angulosBase = [p.PI, p.PI, 0, 0];
                p.shuffle(angulosBase, true); 

                // NUEVO: Mezclar también de manera aleatoria las distancias del centro
                let distanciasAleatorias = [450, 700, 950, 1200];
                p.shuffle(distanciasAleatorias, true);

                let configIslas = [
                    { nombre: 'Roja', color: COLORES_FIGMA.rojo, dist: distanciasAleatorias[0], angulo: angulosBase[0] },
                    { nombre: 'Verde', color: COLORES_FIGMA.verde, dist: distanciasAleatorias[1], angulo: angulosBase[1] },
                    { nombre: 'Azul', color: COLORES_FIGMA.azul, dist: distanciasAleatorias[2], angulo: angulosBase[2] },
                    { nombre: 'Morada', color: COLORES_FIGMA.morado, dist: distanciasAleatorias[3], angulo: angulosBase[3] }
                ];

                for (let config of configIslas) {
                    let anguloFinal = config.angulo + p.random(-0.12, 0.12);
                    let distFinal = config.dist + p.random(-20, 20);

                    let centroX = p.cos(anguloFinal) * distFinal;
                    let centroY = p.sin(anguloFinal) * distFinal;

                    islas.push({
                        nombre: config.nombre,
                        color: config.color,
                        x: centroX,
                        y: centroY,
                        radio: 65, 
                        alcanzada: false
                    });
                }
            }

            function configurarEntornoInicial() {
                nodos = [];
                lineas = [];
                juegoGanado = false;
                particulasMatrix = [];
                
                document.getElementById('pantalla-victoria').classList.remove('activa');
                document.getElementById('ui-instrucciones').style.opacity = "1";

                camaraX = p.windowWidth / 2;
                camaraY = p.windowHeight / 2;
                destinoCamX = camaraX;
                destinoCamY = camaraY;
                destinoZoom = 1.0;

                let nodoCentral = {
                    id: 0,
                    x: 0, 
                    y: 0,
                    tipo: 'tronco',
                    color: 'rgba(255, 255, 255, 0.15)', 
                    hijosMax: 6
                };
                nodos.push(nodoCentral);
                
                generarSeisIniciales(nodoCentral);
                inicializarIslas();
                actualizarMensajeUI();
            }

            reiniciarJuegoTotal = () => {
                configurarEntornoInicial();
            };

            p.setup = () => {
                let canvas = p.createCanvas(p.windowWidth, p.windowHeight);
                canvas.parent('canvas-container');
                configurarEntornoInicial();
            };

            p.draw = () => {
                p.background(juegoGanado ? '#050505' : '#1E1E1E'); 
                
                if (juegoGanado) {
                    gestionarEfectoMatrix();
                    return; 
                }

                camaraX = p.lerp(camaraX, destinoCamX, 0.1);
                camaraY = p.lerp(camaraY, destinoCamY, 0.1);
                zoom = p.lerp(zoom, destinoZoom, 0.1);

                dibujarCuadrículaInfinita();

                p.push();
                p.translate(camaraX, camaraY);
                p.scale(zoom);

                let mouseMundialX = (p.mouseX - camaraX) / zoom;
                let mouseMundialY = (p.mouseY - camaraY) / zoom;

                for (let isla of islas) {
                    p.push();
                    p.translate(isla.x, isla.y);
                    let flotacion = p.sin(p.frameCount * 0.03 + isla.x) * 4;
                    p.translate(0, flotacion);

                    p.stroke(isla.color);
                    p.strokeWeight(4 / zoom); 

                    if (isla.alcanzada) {
                        let colorIsla = p.color(isla.color);
                        colorIsla.setAlpha(210);
                        p.fill(colorIsla);
                    } else {
                        p.fill('rgba(25, 25, 25, 0.7)'); 
                    }

                    dibujarHexagono(0, 0, isla.radio);
                    
                    if (!isla.alcanzada) {
                        p.stroke('rgba(255, 255, 255, 0.08)');
                        dibujarHexagono(0, 0, isla.radio - 12);
                    }

                    p.pop();
                }

                for (let l of lineas) {
                    let medX = (l.p1.x + l.p2.x) / 2;
                    let medY = (l.p1.y + l.p2.y) / 2;
                    p.stroke(l.p1.tipo !== 'vacio' && l.p2.tipo !== 'vacio' ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.18)');
                    p.noFill();
                    p.beginShape();
                    p.vertex(l.p1.x, l.p1.y);
                    p.vertex(medX + (l.p1.x < l.p2.x ? -10 : 10), (l.p1.y + medY) / 2); 
                    p.vertex(medX, medY);
                    p.vertex(l.p2.x, l.p2.y);
                    p.endShape();
                }

                for (let n of nodos) {
                    if (n.tipo === 'vacio') {
                        p.stroke('rgba(255,255,255,0.25)');
                        p.strokeWeight(2 / zoom);
                        p.noFill();
                        dibujarHexagono(n.x, n.y, tamanoHex);
                        if (p.dist(mouseMundialX, mouseMundialY, n.x, n.y) < tamanoHex) {
                            p.fill('rgba(255,255,255,0.15)');
                            dibujarHexagono(n.x, n.y, tamanoHex - 4);
                        }
                    } else {
                        p.stroke('#FFFFFF');
                        p.strokeWeight(2 / zoom);
                        p.fill(n.color);
                        dibujarHexagono(n.x, n.y, tamanoHex);
                        p.fill(255, n.tipo === 'tronco' ? 120 : 200);
                        p.noStroke();
                        p.ellipse(n.x, n.y, n.tipo === 'tronco' ? 6 : 7, n.tipo === 'tronco' ? 6 : 7);
                    }
                }
                p.pop();

                if (p.mouseIsPressed && (!sobreCualquierNodo(mouseMundialX, mouseMundialY) || p.mouseButton !== p.LEFT)) {
                    destinoCamX += p.mouseX - p.pmouseX;
                    destinoCamY += p.mouseY - p.pmouseY;
                }
            };

            p.mousePressed = () => {
                if (document.getElementById('pantalla-carga').classList.contains('carga-terminada') === false) return;
                if (juegoGanado || p.mouseButton !== p.LEFT) return;

                let mouseMundialX = (p.mouseX - camaraX) / zoom;
                let mouseMundialY = (p.mouseY - camaraY) / zoom;

                for (let n of nodos) {
                    if (n.tipo === 'vacio' && p.dist(mouseMundialX, mouseMundialY, n.x, n.y) < tamanoHex) {
                        let opciones = [
                            { color: COLORES_FIGMA.rojo, hijos: 1, nota: 329.63 },   
                            { color: COLORES_FIGMA.verde, hijos: 2, nota: 392.00 },  
                            { color: COLORES_FIGMA.azul, hijos: 3, nota: 440.00 },   
                            { color: COLORES_FIGMA.morado, hijos: 4, nota: 523.25 }  
                        ];
                        
                        let seleccion = p.random(opciones);
                        n.tipo = 'color';
                        n.color = seleccion.color;
                        n.hijosMax = seleccion.hijos; 
                        
                        reproducirSonido(seleccion.nota);
                        ramificar(n);

                        for (let isla of islas) {
                            if (!isla.alcanzada) {
                                let flotacionActual = p.sin(p.frameCount * 0.03 + isla.x) * 4;
                                if (p.dist(n.x, n.y, isla.x, isla.y + flotacionActual) < (isla.radio + tamanoHex - 5)) {
                                    isla.alcanzada = true;
                                    sonidoVictoria();
                                    actualizarMensajeUI();
                                    verificarCondicionVictoriaGlobal();
                                    break;
                                }
                            }
                        }
                        break;
                    }
                }
            };

            function verificarCondicionVictoriaGlobal() {
                if (islas.every(isla => isla.alcanzada)) {
                    juegoGanado = true;
                    sonidoVictoriaFinal();
                    
                    document.getElementById('ui-instrucciones').style.opacity = "0";
                    document.getElementById('pantalla-victoria').classList.add('activa');

                    let columnas = p.width / 24;
                    for (let i = 0; i < columnas; i++) {
                        particulasMatrix.push({
                            x: i * 24 + p.random(-4, 4),
                            y: p.random(-p.height, 0),
                            velocidad: p.random(3, 8),
                            tamano: p.random(8, 18),
                            color: p.random([COLORES_FIGMA.rojo, COLORES_FIGMA.verde, COLORES_FIGMA.azul, COLORES_FIGMA.morado])
                        });
                    }
                }
            }

            function gestionarEfectoMatrix() {
                p.noStroke();
                for (let pt of particulasMatrix) {
                    let c = p.color(pt.color);
                    c.setAlpha(p.map(pt.velocidad, 3, 8, 120, 255));
                    p.fill(c);
                    
                    dibujarHexagono(pt.x, pt.y, pt.tamano);
                    pt.y += pt.velocidad;

                    if (pt.y > p.height + 25) {
                        pt.y = p.random(-100, -20);
                        pt.velocidad = p.random(3, 8);
                        pt.tamano = p.random(8, 18);
                    }
                }
            }

            function actualizarMensajeUI() {
                let restantes = islas.filter(i => !i.alcanzada).map(i => i.nombre);
                let el = document.getElementById('status-islas');
                if (el) el.innerHTML = `Estructuras pendientes: ${restantes.join(', ')}`;
            }

            p.mouseWheel = (event) => {
                if(juegoGanado) return;
                let factorZoom = event.delta > 0 ? 0.9 : 1.1;
                destinoZoom = p.constrain(destinoZoom * factorZoom, 0.2, 3.0); 
                return false; 
            };

            function sobreCualquierNodo(mx, my) {
                for (let n of nodos) {
                    if (p.dist(mx, my, n.x, n.y) < tamanoHex) return true;
                }
                return false;
            }

            function generarSeisIniciales(nodoPadre) {
                for (let i = 0; i < 6; i++) {
                    let angulo = (p.TWO_PI / 6) * i + p.HALF_PI;
                    let nuevoNodo = {
                        id: nodos.length + i + 1,
                        x: nodoPadre.x + p.cos(angulo) * distanciaRamas,
                        y: nodoPadre.y + p.sin(angulo) * distanciaRamas,
                        tipo: 'vacio',
                        color: '#000000',
                        hijosMax: 0,
                        padreX: nodoPadre.x,
                        padreY: nodoPadre.y
                    };
                    nodos.push(nuevoNodo);
                    lineas.push({ p1: nodoPadre, p2: nuevoNodo });
                }
            }

            function ramificar(nodoPadre) {
                let cantidadRamas = nodoPadre.hijosMax;
                let anguloBase = p.atan2(nodoPadre.y - (nodoPadre.padreY || 0), nodoPadre.x - (nodoPadre.padreX || 0));
                if(nodoPadre.padreX === undefined) anguloBase = p.random(p.TWO_PI);

                let ramasCreadas = 0;
                let intentosAngulo = 0;
                
                while (ramasCreadas < cantidadRamas && intentosAngulo < 12) {
                    let division = p.TWO_PI / 6;
                    let anguloPropuesto = anguloBase + (intentosAngulo * division) + p.random(-0.05, 0.05);
                    let nuevoX = nodoPadre.x + p.cos(anguloPropuesto) * distanciaRamas;
                    let nuevoY = nodoPadre.y + p.sin(anguloPropuesto) * distanciaRamas;

                    let superpuesto = false;
                    for (let existente of nodos) {
                        if (p.dist(nuevoX, nuevoY, existente.x, existente.y) < tamanoHex * 2.1) {
                            superpuesto = true;
                            break;
                        }
                    }

                    if (!superpuesto) {
                        let nuevoNodo = {
                            id: nodos.length + 1,
                            x: nuevoX,
                            y: nuevoY,
                            tipo: 'vacio',
                            color: '#000000',
                            hijosMax: 0,
                            padreX: nodoPadre.x,
                            padreY: nodoPadre.y
                        };
                        nodos.push(nuevoNodo);
                        lineas.push({ p1: nodoPadre, p2: nuevoNodo });
                        ramasCreadas++;
                    }
                    intentosAngulo++;
                }
            }

            function dibujarHexagono(x, y, radio) {
                p.beginShape();
                for (let a = 0; a < p.TWO_PI; a += p.TWO_PI / 6) {
                    let hx = x + p.cos(a + p.HALF_PI) * radio;
                    let hy = y + p.sin(a + p.HALF_PI) * radio;
                    p.vertex(hx, hy);
                }
                p.endShape(p.CLOSE);
            }

            function dibujarCuadrículaInfinita() {
                p.stroke('rgba(255, 255, 255, 0.025)');
                p.strokeWeight(1);
                let paso = 80 * zoom; 
                let inicioX = camaraX % paso;
                let inicioY = camaraY % paso;
                for (let x = inicioX; x < p.width; x += paso) p.line(x, 0, x, p.height);
                for (let y = inicioY; y < p.height; y += paso) p.line(0, y, p.width, y);
            }

            p.windowResized = () => {
                p.resizeCanvas(p.windowWidth, p.windowHeight);
            };
        };

        let miEnlaceFatal = new p5(sketch);
        document.oncontextmenu = function() { return false; }
    </script>
